
<!-- BankClasifAI Chatbot -->
<button id="bc-chat-fab" aria-label="Open chat">💬</button>

<div id="bc-chat" class="bc-chat closed" aria-hidden="true">
  <div class="bc-chat__header">
    <div class="bc-chat__brand">
      <div class="bc-chat__logo"><img src="img/icono-blanco.svg" alt=""></div>
      <div class="bc-chat__title">
        <strong>BankClasifAI</strong>
        <span class="bc-chat__subtitle">AI Assistant</span>
      </div>
    </div>

     <div class="bc-chat__actions">
    <button id="bc-chat-expand" class="bc-chat__icon">⤢</button>
    <button id="bc-chat-close" class="bc-chat__icon">✕</button>
  </div>
  </div>

  <div id="bc-chat-messages" class="bc-chat__messages"></div>

  <div id="bc-chat-quick" class="bc-chat__quick"></div>

  <form id="bc-chat-form" class="bc-chat__form">
    <input id="bc-chat-input" class="bc-chat__input" placeholder="Message..." autocomplete="off" />
    <button class="bc-chat__send" type="submit">➤</button>
  </form>

  <div class="bc-chat__footer">AI can make mistakes.Powered by BankClasifAI</div>
</div>
