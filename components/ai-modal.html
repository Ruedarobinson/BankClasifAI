<div class="ai-modal" id="aiModal">

  <div class="ai-modal__overlay" id="aiModalClose"></div>

  <div class="ai-modal__content">

    <button class="ai-modal__close" id="aiModalCloseBtn">✕</button>

    <div class="ai-modal__inner">

      <div class="ai-modal__left">

        <span class="ai-badge" id="aiBadge">

        </span>

        <h2 class="ai-title" id="aiTitle"></h2>

        <p class="ai-text" id="aiText"></p>

        <ul class="ai-features" id="aiFeatures"></ul>

        <button class="ai-btn-primary" id="aiBtn"></button>

      </div>

     <div class="ai-modal__right">
  <img id="aiImage" src="/img/ai-chat-modal.png" alt="AI Financial Advisor">
